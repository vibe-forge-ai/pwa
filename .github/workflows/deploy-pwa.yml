name: Deploy PWA

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref in vibe-forge-ai/vibe-forge.ai
        required: false
        default: master
      source_sha:
        description: Source commit SHA in vibe-forge-ai/vibe-forge.ai
        required: false
        default: ''
  repository_dispatch:
    types:
      - deploy-pwa

permissions:
  contents: write

concurrency:
  group: deploy-pwa
  cancel-in-progress: true

jobs:
  deploy:
    name: build-and-publish
    runs-on: ubuntu-latest
    env:
      SOURCE_REPOSITORY: vibe-forge-ai/vibe-forge.ai
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.client_payload.source_ref || 'master' }}
      SOURCE_SHA: ${{ github.event.inputs.source_sha || github.event.client_payload.source_sha || '' }}
    steps:
      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_SHA != '' && env.SOURCE_SHA || env.SOURCE_REF }}
          path: source
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: source/.node-version
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Build standalone PWA
        working-directory: source
        run: pnpm --filter @vibe-forge/client exec vite build
        env:
          __VF_PROJECT_AI_CLIENT_MODE__: standalone
          __VF_PROJECT_AI_CLIENT_BASE__: /pwa/

      - name: Verify PWA artifact
        working-directory: source
        run: |
          for artifact_path in \
            apps/client/dist/index.html \
            apps/client/dist/manifest.webmanifest \
            apps/client/dist/sw.js \
            apps/client/dist/pwa-icon-192.png \
            apps/client/dist/pwa-icon-512.png
          do
            test -f "$artifact_path"
          done

      - name: Prepare Pages artifact
        working-directory: source
        run: touch apps/client/dist/.nojekyll

      - name: Publish to gh-pages
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf .gh-pages
          git fetch origin gh-pages --depth=1 || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add --detach .gh-pages origin/gh-pages
          else
            git worktree add --detach .gh-pages
            git -C .gh-pages checkout --orphan gh-pages
            git -C .gh-pages rm -rf . || true
          fi

          find .gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R source/apps/client/dist/. .gh-pages/

          git -C .gh-pages add -A
          if git -C .gh-pages diff --cached --quiet; then
            echo "No PWA deployment changes."
            exit 0
          fi

          source_commit="${SOURCE_SHA:-${SOURCE_REF}}"
          git -C .gh-pages commit -m "Deploy PWA from ${source_commit}"
          git -C .gh-pages push origin HEAD:gh-pages
